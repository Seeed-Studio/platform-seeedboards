# MCUboot configuration for XIAO nRF54LM20B board.
# This file is automatically loaded by Zephyr sysbuild when building
# for this board with MCUboot enabled.

# ── Serial Recovery over USB CDC ACM ──
CONFIG_MCUBOOT_SERIAL=y
CONFIG_BOOT_SERIAL_CDC_ACM=y

# ── Recovery Entry Conditions ──

# Wait for DFU commands during boot (1.5-second window).
# This allows PlatformIO to upload firmware via USB without manual button press.
# The timeout is measured from MCUboot start; USB CDC enumeration on the host
# typically takes 1-2 seconds, so this window provides a reasonable balance
# between upload convenience and normal boot latency.
CONFIG_BOOT_SERIAL_WAIT_FOR_DFU=y
CONFIG_BOOT_SERIAL_WAIT_FOR_DFU_TIMEOUT=1500

# Auto-enter serial recovery when no valid application image is present.
# This covers the first-boot and brick-recovery scenarios.
CONFIG_BOOT_SERIAL_NO_APPLICATION=y

# Allow GPIO button entry (mcuboot-button0 alias → board user button).
CONFIG_BOOT_SERIAL_ENTRANCE_GPIO=y

# ── Partition & Flash Config ──

# MCUboot partition needs to be larger than default to fit the USB CDC ACM
# stack. Default 0xC000 (48 KB) is insufficient; 0x11000 (68 KB) is required.
CONFIG_PM_PARTITION_SIZE_MCUBOOT=0x11000

# nRF54LM20 has more flash sectors than typical nRF boards.
CONFIG_BOOT_MAX_IMG_SECTORS=512

# ── USB Stack ──

# Use Zephyr's next-generation USB device stack (required for nRF54LM20 USB HS).
CONFIG_USB_DEVICE_STACK_NEXT=y

# ── Signing ──

# Use RSA-3072 for image signing (software-based, no KMU dependency).
CONFIG_BOOT_SIGNATURE_TYPE_RSA=y
CONFIG_BOOT_RSA_KEY_LEN=3072
