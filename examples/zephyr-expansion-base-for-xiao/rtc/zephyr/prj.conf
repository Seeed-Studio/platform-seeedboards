# Enable I2C driver
CONFIG_I2C=y
# Enable RTC framework
CONFIG_RTC=y
# Enable PCF8563 RTC specific driver
CONFIG_RTC_PCF8563=y

# Keep UART console behavior explicit for consistent serial output.
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
